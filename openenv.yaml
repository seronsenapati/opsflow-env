name: opsflow-env
version: 1.0
description: Real-world delivery operations simulation environment with decision-making tasks

entry_point: env.environment:OpsFlowEnv

observation_space:
  type: object
  description: Task-specific structured input (address, orders, constraints)

action_space:
  type: object
  description: Decision output including corrections, prioritization, and assignments

reward:
  type: float
  range: [0.0, 1.0]

tasks:
  - address_fix
  - prioritization
  - driver_assignment
